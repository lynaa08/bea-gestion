<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tableau de bord - BEA Gestion Projets</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div class="app-shell">
      <!-- TOPBAR -->
      <div class="topbar">
        <div class="topbar-brand">
          <div class="topbar-logo">
            <svg viewBox="0 0 32 32" fill="none">
              <circle cx="16" cy="16" r="13" fill="#0D2B6E" />
              <ellipse
                cx="16"
                cy="16"
                rx="5"
                ry="13"
                stroke="#5BB8E8"
                stroke-width="1.4"
                fill="none" />
              <line
                x1="3"
                y1="16"
                x2="29"
                y2="16"
                stroke="#5BB8E8"
                stroke-width="1.4" />
              <circle
                cx="16"
                cy="16"
                r="13"
                stroke="#5BB8E8"
                stroke-width="1.4"
                fill="none" />
            </svg>
          </div>
          <div class="brand-text">
            <div class="brand-name">Banque Extérieure d'Algérie</div>
            <div class="brand-sub">Système de gestion de projets</div>
          </div>
        </div>
        <div class="topbar-right">
          <div
            class="notif-btn"
            id="remarqueBtnTopbar"
            title="Remarques"
            style="cursor: pointer; margin-right: 2px">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <path
                d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"
                stroke="#4A6A9E"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
                fill="none" />
            </svg>
            <div
              class="notif-dot remarque-dot"
              id="remarqueDot"
              style="display: none; background: #0d2b6e"></div>
          </div>
          <div class="notif-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <path
                d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"
                stroke="#4A6A9E"
                stroke-width="1.8"
                stroke-linecap="round" />
            </svg>
            <div class="notif-dot"></div>
          </div>
          <div class="user-chip">
            <div class="user-chip-avatar"></div>
            <div class="user-chip-info">
              <div class="user-chip-name"></div>
              <div class="user-chip-role"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- BODY -->
      <div class="body">
        <!-- SIDEBAR -->
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <!-- MAIN CONTENT -->
        <div class="main">
          <div class="quick-cards">
            <div
              class="qcard accent"
              onclick="window.location.href = '/projets-list?filter=EN_COURS'">
              <div class="qcard-num" id="qcard-encours">0</div>
              <div class="qcard-label">En cours</div>
            </div>
            <div
              class="qcard warn"
              onclick="
                window.location.href = '/projets-list?filter=NON_COMMENCE'
              ">
              <div class="qcard-num" id="qcard-noncommence">0</div>
              <div class="qcard-label">Non commencés</div>
            </div>
            <div
              class="qcard"
              onclick="window.location.href = '/projets-list?filter=CLOTURE'">
              <div class="qcard-num" id="qcard-cloture">0</div>
              <div class="qcard-label">Clôturés</div>
            </div>
            <div
              class="qcard"
              onclick="
                window.location.href = '/projets-list?filter=PAS_DE_VISIBILITE'
              "
              style="background: linear-gradient(135deg, #8a9fbf22, #8a9fbf11)">
              <div class="qcard-num" id="qcard-pasvisibilite">0</div>
              <div class="qcard-label">Pas de visibilité</div>
            </div>
          </div>

          <div class="form-card">
            <div class="section-label">📊 Statistiques par type de projet</div>
            <div id="stats-by-type">
              <div style="text-align: center; padding: 40px; color: #8a9fbf">
                Chargement des données...
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script th:src="@{/js/sidebar-badge-loader.js}"></script>
    <script th:src="@{/js/auth.js}"></script>
    <script th:src="@{/js/dashboard.js}"></script>
    <script th:src="@{/js/projets.js}"></script>
  </body>
</html>
