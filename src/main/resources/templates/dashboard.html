<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tableau de bord - BEA Gestion Projets</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div class="app-shell">
      <!-- TOPBAR -->
      <div class="topbar">
        <div class="topbar-brand">
          <div class="topbar-logo">
            <svg viewBox="0 0 32 32" fill="none">
              <circle cx="16" cy="16" r="13" fill="#0D2B6E" />
              <ellipse
                cx="16"
                cy="16"
                rx="5"
                ry="13"
                stroke="#5BB8E8"
                stroke-width="1.4"
                fill="none"
              />
              <line
                x1="3"
                y1="16"
                x2="29"
                y2="16"
                stroke="#5BB8E8"
                stroke-width="1.4"
              />
              <circle
                cx="16"
                cy="16"
                r="13"
                stroke="#5BB8E8"
                stroke-width="1.4"
                fill="none"
              />
            </svg>
          </div>
          <div class="brand-text">
            <div class="brand-name">Banque Extérieure d'Algérie</div>
            <div class="brand-sub">Système de gestion de projets</div>
          </div>
        </div>
        <div class="topbar-right">
          <div class="notif-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <path
                d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"
                stroke="#4A6A9E"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
            <div class="notif-dot"></div>
          </div>
          <div class="user-chip">
            <div class="user-chip-avatar"></div>
            <div class="user-chip-info">
              <div class="user-chip-name"></div>
              <div class="user-chip-role"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- BODY -->
      <div class="body">
        <!-- SIDEBAR -->
        <div class="sidebar">
          <div class="sidebar-profile">
            <div class="avatar-ring">
              <svg viewBox="0 0 36 36" fill="none">
                <circle cx="18" cy="13" r="7" fill="rgba(255,255,255,0.9)" />
                <path
                  d="M4 32c0-7.7 6.3-14 14-14s14 6.3 14 14"
                  fill="rgba(255,255,255,0.9)"
                />
              </svg>
            </div>
            <div class="sidebar-name"></div>
            <div class="sidebar-role"></div>
          </div>

          <!-- PROJETS -->
          <div class="nav-section-label">Projets</div>
          <div
            class="nav-item"
            onclick="window.location.href = '/projets-list'"
          >
            <div class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <rect
                  x="3"
                  y="3"
                  width="7"
                  height="7"
                  rx="1.5"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5"
                />
                <rect
                  x="14"
                  y="3"
                  width="7"
                  height="7"
                  rx="1.5"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5"
                />
                <rect
                  x="3"
                  y="14"
                  width="7"
                  height="7"
                  rx="1.5"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5"
                />
                <rect
                  x="14"
                  y="14"
                  width="7"
                  height="7"
                  rx="1.5"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5"
                />
              </svg>
            </div>
            <span class="nav-label">Tous les projets</span>
          </div>

          <!-- ADMINISTRATION -->
          <div class="nav-section-label" style="margin-top: 8px">
            Administration
          </div>
          <div class="nav-item" onclick="window.location.href = '/users-list'">
            <div class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <circle
                  cx="12"
                  cy="8"
                  r="4"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5"
                />
                <path
                  d="M4 20c0-4 3.6-7 8-7s8 3 8 7"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5"
                  stroke-linecap="round"
                />
                <path
                  d="M19 8v6M22 11h-6"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5"
                  stroke-linecap="round"
                />
              </svg>
            </div>
            <span class="nav-label">Créer User</span>
          </div>
          <div class="nav-item" onclick="window.location.href = '/projets/new'">
            <div class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <rect
                  x="3"
                  y="5"
                  width="18"
                  height="16"
                  rx="2"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5"
                  fill="none"
                />
                <path
                  d="M8 3v4M16 3v4M3 11h18"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5"
                  stroke-linecap="round"
                />
                <path
                  d="M12 15v4M10 17h4"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5"
                  stroke-linecap="round"
                />
              </svg>
            </div>
            <span class="nav-label">Créer un Projet</span>
          </div>

          <!-- AGENDA -->
          <div class="nav-section-label" style="margin-top: 8px">Agenda</div>
          <div class="nav-item" onclick="window.location.href = '/agenda'">
            <div class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <rect
                  x="3"
                  y="4"
                  width="18"
                  height="18"
                  rx="2"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5"
                  fill="none"
                />
                <path
                  d="M3 10h18M8 2v4M16 2v4"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5"
                  stroke-linecap="round"
                />
              </svg>
            </div>
            <span class="nav-label">Agenda</span>
          </div>
          <!--materiel-->
          <div class="nav-item" onclick="window.location.href = '/materiel'">
            <div class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <rect
                  x="4"
                  y="4"
                  width="16"
                  height="16"
                  rx="2"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5"
                />
                <path
                  d="M9 9h6M9 13h6M9 17h6M5 9h.01M5 13h.01M5 17h.01M19 9h.01M19 13h.01M19 17h.01"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5"
                  stroke-linecap="round"
                />
              </svg>
            </div>
            <span class="nav-label">Matériel</span>
          </div>

          <!-- PARAMÈTRES -->
          <div class="nav-section-label" style="margin-top: 8px">
            Paramètres
          </div>
          <div class="nav-item" onclick="window.location.href = '/parametres'">
            <div class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <circle
                  cx="12"
                  cy="12"
                  r="3"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5"
                />
                <path
                  d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5"
                />
              </svg>
            </div>
            <span class="nav-label">Paramètres</span>
          </div>

          <div class="nav-item" onclick="window.location.href = '/problemes'">
            <div class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <circle
                  cx="12"
                  cy="12"
                  r="10"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5"
                />
                <path
                  d="M12 8v4M12 16h.01"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </svg>
            </div>
            <span class="nav-label">Problèmes</span>
          </div>
          <div class="sidebar-bottom">
            <div class="logout-btn" onclick="logout()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                <path
                  d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"
                  stroke="#E8896A"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <span class="logout-label">Déconnexion</span>
            </div>
          </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main">
          <div class="quick-cards">
            <div
              class="qcard accent"
              onclick="window.location.href = '/projets-list?filter=encours'"
            >
              <div class="qcard-num">0</div>
              <div class="qcard-label">En cours</div>
            </div>
            <div
              class="qcard warn"
              onclick="window.location.href = '/projets-list?filter=attente'"
            >
              <div class="qcard-num">0</div>
              <div class="qcard-label">En attente</div>
            </div>
            <div
              class="qcard"
              onclick="window.location.href = '/projets-list?filter=termine'"
            >
              <div class="qcard-num">0</div>
              <div class="qcard-label">Terminés</div>
            </div>
          </div>

          <div class="form-card">
            <div class="section-label">📊 Statistiques par type de projet</div>
            <div id="stats-by-type">
              <div style="text-align: center; padding: 40px; color: #8a9fbf">
                Chargement des données...
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script th:src="@{/js/auth.js}"></script>
    <script th:src="@{/js/dashboard.js}"></script>
    <script th:src="@{/js/projets.js}"></script>
    <script th:src="@{/js/materiel.js}"></script>
  </body>
</html>
