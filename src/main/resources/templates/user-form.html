<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Créer Utilisateur - BEA</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
      .form-card {
        max-width: 760px;
        margin: 0 auto;
      }
      .form-grid2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      .field {
        margin-bottom: 14px;
      }
      .field-label {
        font-size: 12px;
        font-weight: 600;
        color: #4a6080;
        margin-bottom: 5px;
        display: block;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .req {
        color: #e05a2b;
      }
      .field-input,
      .field-select {
        width: 100%;
        padding: 10px 12px;
        border: 1.5px solid #d8e6f2;
        border-radius: 8px;
        font-size: 14px;
        color: #1a2d5a;
        outline: none;
        transition: border-color 0.15s;
        background: #fff;
      }
      .field-input:focus,
      .field-select:focus {
        border-color: #5bb8e8;
      }
      .matricule-highlight {
        border-color: #0d2b6e !important;
        background: #f0f4ff !important;
      }
      .matricule-highlight:focus {
        border-color: #5bb8e8 !important;
      }
      .badge-primary {
        display: inline-block;
        background: #0d2b6e;
        color: #fff;
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 10px;
        margin-left: 8px;
        vertical-align: middle;
      }
      .section-label {
        font-size: 11px;
        font-weight: 700;
        color: #8a9fbf;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin: 18px 0 12px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .divider {
        height: 1px;
        background: #eef2f8;
        margin: 16px 0;
      }
      .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid #eef2f8;
      }
      .btn-cancel {
        padding: 10px 20px;
        background: #f5f5f5;
        border: 1px solid #ddd;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
      }
      .btn-submit {
        padding: 10px 24px;
        background: #0d2b6e;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
      }
      .btn-submit:hover {
        background: #1a3f8f;
      }
      .error-message {
        background: #fee;
        color: #c00;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 15px;
        font-size: 12px;
      }
      .success-message {
        background: #efe;
        color: #0a0;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 15px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <div class="topbar">
        <div class="topbar-brand">
          <div class="topbar-logo">
            <svg viewBox="0 0 32 32" fill="none" width="20" height="20">
              <circle cx="16" cy="16" r="13" fill="#0D2B6E" />
              <ellipse
                cx="16"
                cy="16"
                rx="5"
                ry="13"
                stroke="#5BB8E8"
                stroke-width="1.4"
                fill="none"
              />
              <line
                x1="3"
                y1="16"
                x2="29"
                y2="16"
                stroke="#5BB8E8"
                stroke-width="1.4"
              />
              <circle
                cx="16"
                cy="16"
                r="13"
                stroke="#5BB8E8"
                stroke-width="1.4"
                fill="none"
              />
            </svg>
          </div>
          <div class="brand-text">
            <div class="brand-name">Banque Extérieure d'Algérie</div>
            <div class="brand-sub">Gestion de projets</div>
          </div>
        </div>
        <div class="topbar-right">
          <div
            class="notif-btn"
            id="remarqueBtnTopbar"
            title="Remarques"
            style="cursor: pointer; margin-right: 2px"
          >
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <path
                d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"
                stroke="#4A6A9E"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
                fill="none"
              />
            </svg>
            <div
              class="notif-dot remarque-dot"
              id="remarqueDot"
              style="display: none; background: #0d2b6e"
            ></div>
          </div>
          <div class="notif-btn" style="position: relative; cursor: pointer">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <path
                d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"
                stroke="#4A6A9E"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
          </div>
          <div class="user-chip">
            <div class="user-chip-avatar"></div>
            <div class="user-chip-info">
              <div class="user-chip-name"></div>
              <div class="user-chip-role"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="body">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div class="main">
          <div class="form-card">
            <div class="page-heading">
              <div class="page-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                  <circle
                    cx="12"
                    cy="8"
                    r="4"
                    stroke="#0D2B6E"
                    stroke-width="2"
                  />
                  <path
                    d="M4 20c0-4 3.6-7 8-7s8 3 8 7"
                    stroke="#0D2B6E"
                    stroke-width="2"
                    stroke-linecap="round"
                  />
                  <path
                    d="M19 8v6M22 11h-6"
                    stroke="#0D2B6E"
                    stroke-width="2"
                    stroke-linecap="round"
                  />
                </svg>
              </div>
              <div class="page-title" id="pageTitle">Créer un utilisateur</div>
            </div>
            <div class="page-sub">
              Renseignez les informations pour créer un nouvel accès.
            </div>

            <div id="messageArea"></div>

            <form id="userForm" onsubmit="handleUserSubmit(event)">
              <input type="hidden" id="userId" />

              <div class="section-label">
                🆔 Matricule
                <span class="badge-primary">Identifiant principal</span>
              </div>
              <div class="field">
                <label class="field-label"
                  >Matricule <span class="req">*</span></label
                >
                <input
                  type="text"
                  class="field-input matricule-highlight"
                  id="matricule"
                  placeholder="Ex: DEV001, PMO001, CDEP001"
                  required
                  style="
                    font-size: 16px;
                    font-weight: 600;
                    letter-spacing: 0.05em;
                  "
                />
                <small
                  style="
                    color: #8a9fbf;
                    font-size: 10px;
                    margin-top: 4px;
                    display: block;
                  "
                >
                  Le matricule sert d'identifiant de connexion. Il doit être
                  unique.
                </small>
              </div>

              <div class="divider"></div>

              <div class="section-label">👤 Identité</div>
              <div class="form-grid2">
                <div class="field">
                  <label class="field-label"
                    >Nom <span class="req">*</span></label
                  >
                  <input type="text" class="field-input" id="nom" required />
                </div>
                <div class="field">
                  <label class="field-label"
                    >Prénom <span class="req">*</span></label
                  >
                  <input type="text" class="field-input" id="prenom" required />
                </div>
                <div class="field">
                  <label class="field-label">Email</label>
                  <input
                    type="email"
                    class="field-input"
                    id="email"
                    placeholder="prenom.nom@bea.dz"
                  />
                </div>
                <div class="field">
                  <label class="field-label">Téléphone</label>
                  <input type="tel" class="field-input" id="telephone" />
                </div>
              </div>

              <div class="divider"></div>

              <div class="section-label">🔐 Accès</div>
              <div class="form-grid2">
                <div class="field">
                  <label class="field-label"
                    >Mot de passe <span class="req">*</span></label
                  >
                  <input
                    type="password"
                    class="field-input"
                    id="password"
                    placeholder="••••••••••"
                  />
                  <small style="color: #8a9fbf; font-size: 10px"
                    >Laisser vide pour conserver en modification</small
                  >
                </div>
                <div class="field">
                  <label class="field-label"
                    >Rôle <span class="req">*</span></label
                  >
                  <select class="field-select" id="role" required>
                    <option value="">-- Sélectionner --</option>
                    <option value="DIRECTEUR">Directeur</option>
                    <option value="CHEF_DEPARTEMENT">
                      Chef de département
                    </option>
                    <option value="ADMIN">Administrateur</option>
                    <option value="INGENIEUR_ETUDE_PMO">
                      Ingénieur d'étude (PMO)
                    </option>
                    <option value="DEVELOPPEUR">Développeur</option>
                  </select>
                </div>
              </div>

              <div class="form-actions">
                <button
                  type="button"
                  class="btn-cancel"
                  onclick="window.location.href = '/users-list'"
                >
                  Annuler
                </button>
                <button type="submit" class="btn-submit">✓ Valider</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script th:src="@{/js/sidebar-badge-loader.js}"></script>
    <script th:src="@{/js/auth.js}"></script>
    <script th:src="@{/js/users.js}"></script>
  </body>
</html>
