<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liste des projets - BEA</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <style>
    .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
    .search-wrap{display:flex;align-items:center;gap:0;background:#fff;border:1.5px solid #d8e6f2;border-radius:8px;padding:0 12px;flex:1;min-width:180px;max-width:280px}
    .search-ic{flex-shrink:0}
    .search-input{border:none;outline:none;font-size:13px;padding:9px 8px;color:#1a2d5a;width:100%;background:transparent}
    .filter-tabs{display:flex;gap:4px}
    .ftab{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;color:#8a9fbf;background:#f5f8fd;border:1px solid transparent;transition:all .15s}
    .ftab.active{background:#0d2b6e;color:#fff;border-color:#0d2b6e}
    .sort-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;background:#fff;border:1.5px solid #d8e6f2;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;color:#4a6080;margin-left:auto}
    .sort-btn:hover{background:#f0f4ff;border-color:#5bb8e8}
  </style>
</head>
<body>
<div class="app-shell">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">
        <svg viewBox="0 0 32 32" fill="none" width="20" height="20">
          <circle cx="16" cy="16" r="13" fill="#0D2B6E"/>
          <ellipse cx="16" cy="16" rx="5" ry="13" stroke="#5BB8E8" stroke-width="1.4" fill="none"/>
          <line x1="3" y1="16" x2="29" y2="16" stroke="#5BB8E8" stroke-width="1.4"/>
          <circle cx="16" cy="16" r="13" stroke="#5BB8E8" stroke-width="1.4" fill="none"/>
        </svg>
      </div>
      <div class="brand-text">
        <div class="brand-name">Banque Extérieure d'Algérie</div>
        <div class="brand-sub">Système de gestion de projets</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="notif-btn" style="position:relative;cursor:pointer">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" stroke="#4A6A9E" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <div class="notif-dot"></div>
      </div>
      <div class="user-chip">
        <div class="user-chip-avatar"></div>
        <div class="user-chip-info">
          <div class="user-chip-name"></div>
          <div class="user-chip-role"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="body">
    <div class="sidebar">
      <div class="sidebar-profile">
        <div class="avatar-ring">
          <svg viewBox="0 0 36 36" fill="none">
            <circle cx="18" cy="13" r="7" fill="rgba(255,255,255,0.9)"/>
            <path d="M4 32c0-7.7 6.3-14 14-14s14 6.3 14 14" fill="rgba(255,255,255,0.9)"/>
          </svg>
        </div>
        <div class="sidebar-name"></div>
        <div class="sidebar-role"></div>
      </div>

      <div class="nav-section-label">Navigation</div>
      <div class="nav-item" onclick="window.location.href='/dashboard'">
        <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/></svg></div>
        <span class="nav-label">Dashboard</span>
      </div>
      <div class="nav-item active">
        <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="#5BB8E8" stroke-width="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="#5BB8E8" stroke-width="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="#5BB8E8" stroke-width="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke="#5BB8E8" stroke-width="1.5"/></svg></div>
        <span class="nav-label">Tous les projets</span>
      </div>
      <div class="nav-item" onclick="window.location.href='/projets/new'">
        <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none"/><path d="M8 3v4M16 3v4M3 11h18" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/></svg></div>
        <span class="nav-label">Créer un projet</span>
      </div>
      <div class="nav-section-label" style="margin-top:8px">Administration</div>
      <div class="nav-item" onclick="window.location.href='/users-list'">
        <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/></svg></div>
        <span class="nav-label">Utilisateurs</span>
      </div>
      <div class="nav-item" onclick="window.location.href='/problemes'">
        <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><path d="M12 8v4M12 16h.01" stroke="rgba(255,255,255,0.5)" stroke-width="1.8" stroke-linecap="round"/></svg></div>
        <span class="nav-label">Problèmes</span>
      </div>

      <div class="sidebar-bottom">
        <div class="logout-btn" onclick="logout()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="#E8896A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="logout-label">Déconnexion</span>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="table-card">
        <div class="toolbar">
          <div class="search-wrap">
            <div class="search-ic"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="#B0BDD0" stroke-width="1.8"/><path d="M21 21l-4.35-4.35" stroke="#B0BDD0" stroke-width="1.8" stroke-linecap="round"/></svg></div>
            <input class="search-input" id="searchInput" placeholder="Rechercher un projet…" oninput="onSearch()"/>
          </div>
          <div class="filter-tabs">
            <div class="ftab active" onclick="setFilter('Tous',this)">Tous</div>
            <div class="ftab" onclick="setFilter('EN_COURS',this)">En cours</div>
            <div class="ftab" onclick="setFilter('EN_ATTENTE',this)">En attente</div>
            <div class="ftab" onclick="setFilter('TERMINE',this)">Terminé</div>
          </div>
          <button class="sort-btn" onclick="window.location.href='/projets/new'">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#4A6080" stroke-width="2" stroke-linecap="round"/></svg>
            Nouveau projet
          </button>
        </div>

        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nom projet</th>
              <th>Date début</th>
              <th>État</th>
              <th>Type</th>
              <th>Chef de projet</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="projetsBody">
            <tr><td colspan="7" style="text-align:center;padding:40px;color:#b0bdd0">Chargement...</td></tr>
          </tbody>
        </table>

        <div class="pagination">
          <div class="page-info" id="pageInfo"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/js/auth.js}"></script>
<script>
let allProjets = [];
let currentFilter = 'Tous';
let searchVal = '';

const statutLabel = {EN_COURS:'En cours', EN_ATTENTE:'En attente', TERMINE:'Terminé'};
const statutColor = {EN_COURS:'#5bb8e8', EN_ATTENTE:'#f59e0b', TERMINE:'#22c55e'};

async function loadProjets() {
  try {
    const res = await fetch('/api/projets/all', {headers: getAuthHeaders()});
    if (!res.ok) { showEmpty(); return; }
    allProjets = await res.json();
    render();
  } catch(e) { showEmpty(); }
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function onSearch() {
  searchVal = document.getElementById('searchInput').value.toLowerCase();
  render();
}

function render() {
  const tbody = document.getElementById('projetsBody');
  let list = allProjets;
  if (currentFilter !== 'Tous') list = list.filter(p => p.statut === currentFilter);
  if (searchVal) list = list.filter(p => (p.nom||'').toLowerCase().includes(searchVal));
  document.getElementById('pageInfo').textContent = list.length + ' projet(s)';
  if (!list.length) { showEmpty(); return; }
  tbody.innerHTML = list.map(p => {
    const sc = statutColor[p.statut] || '#8a9fbf';
    const sl = statutLabel[p.statut] || p.statut || '—';
    const chefInfo = p.chefProjetMatricule
      ? `<span style="font-weight:600;color:#0d2b6e">${p.chefProjetMatricule}</span><br><small style="color:#8a9fbf">${p.chefProjetNom||''}</small>`
      : (p.chefProjetNom || '—');
    return `<tr>
      <td style="color:#b0bdd0;font-size:12px">#${p.id}</td>
      <td style="font-weight:600;color:#1a2d5a">${p.nom||'—'}</td>
      <td>${p.dateDebut || '—'}</td>
      <td><span style="background:${sc}22;color:${sc};padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700">${sl}</span></td>
      <td><span style="background:#f0f4ff;color:#4a6080;padding:3px 8px;border-radius:6px;font-size:11px">${p.type||'—'}</span></td>
      <td>${chefInfo}</td>
      <td>
        <button onclick="window.location.href='/projets/edit/${p.id}'" style="background:#eef4ff;border:none;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px;color:#0d2b6e;font-weight:600">Modifier</button>
        <button onclick="delProjet(${p.id})" style="background:#fee;border:none;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px;color:#c00;font-weight:600;margin-left:4px">Supprimer</button>
      </td>
    </tr>`;
  }).join('');
}

function showEmpty() {
  document.getElementById('projetsBody').innerHTML =
    '<tr><td colspan="7" style="text-align:center;padding:50px;color:#b0bdd0">Aucun projet trouvé</td></tr>';
}

async function delProjet(id) {
  if (!confirm('Supprimer ce projet ?')) return;
  try {
    const res = await fetch(`/api/projets/${id}`, {method:'DELETE', headers: getAuthHeaders()});
    if (res.ok) loadProjets();
    else alert('Erreur suppression');
  } catch(e) { alert('Erreur réseau'); }
}

document.addEventListener('DOMContentLoaded', loadProjets);
</script>
</body>
</html>
