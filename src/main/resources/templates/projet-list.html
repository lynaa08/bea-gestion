<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des projets - BEA Gestion Projets</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="app-shell">
        <!-- TOPBAR (same as dashboard) -->
        <div class="topbar">
            <div class="topbar-brand">
                <div class="topbar-logo">
                    <svg viewBox="0 0 32 32" fill="none">
                        <circle cx="16" cy="16" r="13" fill="#0D2B6E"/>
                        <ellipse cx="16" cy="16" rx="5" ry="13" stroke="#5BB8E8" stroke-width="1.4" fill="none"/>
                        <line x1="3" y1="16" x2="29" y2="16" stroke="#5BB8E8" stroke-width="1.4"/>
                        <circle cx="16" cy="16" r="13" stroke="#5BB8E8" stroke-width="1.4" fill="none"/>
                    </svg>
                </div>
                <div class="brand-text">
                    <div class="brand-name">Banque Extérieure d'Algérie</div>
                    <div class="brand-sub">Système de gestion de projets</div>
                </div>
            </div>
            <div class="topbar-right">
                <div class="notif-btn">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" stroke="#4A6A9E" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                    <div class="notif-dot"></div>
                </div>
                <div class="user-chip">
                    <div class="user-chip-avatar"></div>
                    <div class="user-chip-info">
                        <div class="user-chip-name"></div>
                        <div class="user-chip-role"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="body">
            <!-- SIDEBAR (same as dashboard) -->
            <div class="sidebar">
                <div class="sidebar-profile">
                    <div class="avatar-ring">
                        <svg viewBox="0 0 36 36" fill="none">
                            <circle cx="18" cy="13" r="7" fill="rgba(255,255,255,0.9)"/>
                            <path d="M4 32c0-7.7 6.3-14 14-14s14 6.3 14 14" fill="rgba(255,255,255,0.9)"/>
                        </svg>
                    </div>
                    <div class="sidebar-name"></div>
                    <div class="sidebar-role"></div>
                </div>

                <div class="nav-section-label">Projets</div>
                <div class="nav-item active" onclick="window.location.href='/projets'">
                    <div class="nav-icon">
                        <svg viewBox="0 0 24 24" fill="none">
                            <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="#5BB8E8" stroke-width="1.5"/>
                            <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="#5BB8E8" stroke-width="1.5"/>
                            <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="#5BB8E8" stroke-width="1.5"/>
                            <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="#5BB8E8" stroke-width="1.5"/>
                        </svg>
                    </div>
                    <span class="nav-label">Tous les projets</span>
                </div>

                <div class="nav-section-label" style="margin-top:8px;">Administration</div>
                <div class="nav-item" onclick="window.location.href='/users/new'">
                    <div class="nav-icon">
                        <svg viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="8" r="4" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M19 8v6M22 11h-6" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <span class="nav-label">Créer User</span>
                </div>

                <div class="nav-item" onclick="window.location.href='/projets/new'">
                    <div class="nav-icon">
                        <svg viewBox="0 0 24 24" fill="none">
                            <rect x="3" y="5" width="18" height="16" rx="2" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none"/>
                            <path d="M8 3v4M16 3v4M3 11h18" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <span class="nav-label">Créer un Projet</span>
                </div>

                <div class="sidebar-bottom">
                    <div class="logout-btn" onclick="logout()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="#E8896A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span class="logout-label">Déconnexion</span>
                    </div>
                </div>
            </div>

            <!-- MAIN CONTENT -->
            <div class="main">
                <div class="toolbar">
                    <div class="search-wrap">
                        <div class="search-ic">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                                <circle cx="11" cy="11" r="8" stroke="#B0BDD0" stroke-width="1.8"/>
                                <path d="M21 21l-4.35-4.35" stroke="#B0BDD0" stroke-width="1.8" stroke-linecap="round"/>
                            </svg>
                        </div>
                        <input class="search-input" placeholder="Rechercher un projet…" onkeypress="if(event.key==='Enter') searchProjects()"/>
                    </div>
                    <div class="filter-tabs">
                        <div class="ftab active" onclick="filterProjects('Tous')">Tous</div>
                        <div class="ftab" onclick="filterProjects('En cours')">En cours</div>
                        <div class="ftab" onclick="filterProjects('En attente')">En attente</div>
                        <div class="ftab" onclick="filterProjects('Terminé')">Terminé</div>
                    </div>
                    <button class="sort-btn" onclick="window.location.href='/projets/new'">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                            <path d="M12 5v14M5 12h14" stroke="#4A6080" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        Nouveau projet
                    </button>
                </div>

                <div class="table-card">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nom projet</th>
                                <th>Date début</th>
                                <th>État</th>
                                <th>Type</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Projects will be loaded here by JavaScript -->
                        </tbody>
                    </table>

                    <div class="pagination">
                        <div class="page-info"></div>
                        <div class="page-btns"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/auth.js}"></script>
    <script th:src="@{/js/projets.js}"></script>
</body>
</html>
