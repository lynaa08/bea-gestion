<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Connexion - BEA Gestion Projets</title>
    <style>
      /* =====================================================
      LOGIN.CSS — Banque Extérieure d'Algérie
      Glassmorphism + background image
      Classes originales conservées à 100%
      ===================================================== */

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: stretch;
        overflow: hidden;
        position: fixed;
        inset: 0;
      }

      /* ══════════════════════════════════════
      PAGE ENTIÈRE = image de fond
      ══════════════════════════════════════ */
      .login-page {
        display: flex;
        width: 100%;
        min-height: 100vh;
        position: relative;

        background-image: url(@{/images/login_bg_bea.jpg});
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      /* Overlay sombre global */
      .login-page::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(5, 18, 50, 0.52);
        z-index: 0;
      }

      /* ══════════════════════════════════════
      PANNEAU GAUCHE — transparent, logo + slogan
      ══════════════════════════════════════ */
      .left-panel {
        flex: 1;
        background: transparent !important; /* écrase l'ancien #0d2b6e */
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-end;
        padding: 0 0 56px 60px;
        position: relative;
        z-index: 1;
        overflow: visible;
      }

      /* Supprime les pseudo-éléments cercles de l'ancien design */
      .left-panel::before,
      .left-panel::after {
        display: none;
      }

      /* Container logo + texte en bas à gauche */
      .logo-wrap {
        width: auto;
        height: auto;
        border-radius: 0;
        background: transparent;
        border: none;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        margin-bottom: 20px;
        position: relative;
        z-index: 1;
      }

      /* Le SVG globe devient le logo BEA */
      .logo-wrap svg {
        filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.5));
      }

      /* Nom arabe de la banque */
      .bank-name-ar {
        font-size: 22px;
        color: #ffffff !important;
        font-weight: 700;
        margin-bottom: 6px;
        position: relative;
        z-index: 1;
        text-align: left;
        direction: rtl;
        text-shadow: 0 2px 16px rgba(0, 0, 0, 0.5);
      }

      /* Nom français de la banque */
      .bank-name-fr {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.65) !important;
        text-align: left;
        position: relative;
        z-index: 1;
        letter-spacing: 0.3px;
      }

      /* Séparateur — remplacé par un trait lumineux discret */
      .divider {
        width: 60px;
        height: 2px;
        background: rgba(91, 184, 232, 0.6);
        border-radius: 2px;
        margin: 18px 0;
        position: relative;
        z-index: 1;
      }

      /* Tagline */
      .tagline {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.45);
        text-align: left;
        line-height: 1.6;
        position: relative;
        z-index: 1;
        max-width: 260px;
      }

      /* Slogan principal visible (décommenté dans le HTML via tagline) */
      .bank-name-ar + .divider + .tagline,
      .tagline {
        font-size: 28px;
        font-weight: 700;
        color: #ffffff;
        line-height: 1.25;
        letter-spacing: -0.3px;
        text-shadow: 0 2px 16px rgba(0, 0, 0, 0.5);
        max-width: 420px;
      }

      /* ══════════════════════════════════════
      PANNEAU DROIT — GLASSMORPHISM
      ══════════════════════════════════════ */
      .right-panel {
        width: 440px;
        min-height: 100vh;
        background: rgba(
          255,
          255,
          255,
          0.08
        ) !important; /* glass transparent */
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border-left: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: -8px 0 40px rgba(0, 0, 0, 0.25);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 44px;
        position: relative;
        z-index: 1;
        overflow-y: auto;

        animation: slideIn 0.5s ease forwards;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* ── Badge "Accès sécurisé" ── */
      .login-badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        background: rgba(91, 184, 232, 0.12) !important;
        border: 1px solid rgba(91, 184, 232, 0.35) !important;
        border-radius: 20px;
        padding: 5px 16px;
        font-size: 11px;
        font-weight: 600;
        color: #7ecff0 !important;
        letter-spacing: 0.5px;
        margin-bottom: 28px;
        text-transform: uppercase;
      }

      .login-badge-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #5bb8e8;
        box-shadow: 0 0 6px #5bb8e8;
        animation: blink 2s infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      /* ── Titre ── */
      .login-title {
        font-size: 28px;
        font-weight: 700;
        color: #ffffff !important;
        margin-bottom: 6px;
        text-align: center;
        letter-spacing: -0.3px;
      }

      /* ── Sous-titre ── */
      .login-subtitle {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5) !important;
        margin-bottom: 36px;
        text-align: center;
        line-height: 1.55;
      }

      /* ── Labels ── */
      .form-label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.55) !important;
        margin-bottom: 7px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      /* ── Inputs ── */
      .form-input {
        width: 100%;
        height: 48px;
        padding: 0 14px 0 44px;
        background: rgba(255, 255, 255, 0.08) !important;
        border: 1.5px solid rgba(255, 255, 255, 0.15) !important;
        border-radius: 10px;
        font-size: 14px;
        color: #ffffff !important;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s,
          background 0.2s;
      }

      .form-input::placeholder {
        color: rgba(255, 255, 255, 0.3) !important;
      }

      .form-input:focus {
        border-color: #5bb8e8 !important;
        background: rgba(255, 255, 255, 0.12) !important;
        box-shadow: 0 0 0 3px rgba(91, 184, 232, 0.2);
      }

      /* Icônes dans les inputs */
      .input-icon svg path,
      .input-icon svg circle,
      .input-icon svg rect {
        stroke: rgba(255, 255, 255, 0.5);
      }

      /* Icône œil */
      .show-pwd {
        opacity: 0.4;
        transition: opacity 0.2s;
      }
      .show-pwd:hover {
        opacity: 0.85;
      }

      /* ── Bouton Connexion ── */
      .btn-login {
        width: 100%;
        height: 50px;
        background: linear-gradient(
          135deg,
          #1a4ba8 0%,
          #5bb8e8 100%
        ) !important;
        color: #fff !important;
        border: none !important;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.1em;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        transition: all 0.2s;
        margin-top: 10px;
        box-shadow: 0 4px 20px rgba(91, 184, 232, 0.3);
        text-transform: uppercase;
      }

      .btn-login:hover {
        background: linear-gradient(
          135deg,
          #5bb8e8 0%,
          #1a4ba8 100%
        ) !important;
        box-shadow: 0 6px 28px rgba(91, 184, 232, 0.45);
        transform: translateY(-1px);
      }

      .btn-login:active {
        transform: translateY(0);
      }

      /* ── Séparateur footer ── */
      .login-footer {
        margin-top: 28px;
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
      }

      .footer-line {
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.12);
      }

      .footer-text {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.3);
        white-space: nowrap;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      /* ── Note sécurité ── */
      .security-note {
        margin-top: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(91, 184, 232, 0.07) !important;
        border: 1px solid rgba(91, 184, 232, 0.2);
        border-radius: 8px;
        padding: 10px 14px;
        width: 100%;
      }

      .security-note span {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.4) !important;
        line-height: 1.5;
      }

      /* ── Info box (comptes démo) ── */
      .info-box {
        background: rgba(91, 184, 232, 0.08) !important;
        border: 1px solid rgba(91, 184, 232, 0.25) !important;
        border-radius: 8px;
        padding: 12px;
        margin-top: 20px;
        width: 100%;
      }

      .info-box-title {
        font-weight: 700;
        color: rgba(255, 255, 255, 0.8) !important;
        margin-bottom: 8px;
        font-size: 12px;
      }

      .info-box-content {
        color: rgba(255, 255, 255, 0.5) !important;
        line-height: 1.6;
        font-size: 11px;
      }

      .info-box-content strong {
        color: rgba(255, 255, 255, 0.8) !important;
      }

      /* ── Messages erreur / succès ── */
      .error-message {
        background: rgba(255, 60, 60, 0.15);
        color: #ff9999;
        padding: 10px 14px;
        border-radius: 8px;
        margin-bottom: 16px;
        font-size: 12px;
        text-align: center;
        border: 1px solid rgba(255, 60, 60, 0.3);
        width: 100%;
        animation: shake 0.3s ease;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-6px);
        }
        75% {
          transform: translateX(6px);
        }
      }

      .success-message {
        background: rgba(0, 200, 100, 0.12);
        color: #7fffb2;
        padding: 10px 14px;
        border-radius: 8px;
        margin-bottom: 16px;
        font-size: 12px;
        text-align: center;
        border: 1px solid rgba(0, 200, 100, 0.25);
        width: 100%;
      }

      /* ══════════════════════════════════════
      RESPONSIVE mobile
      ══════════════════════════════════════ */
      @media (max-width: 768px) {
        .left-panel {
          display: none;
        }
        .right-panel {
          width: 100% !important;
          border-left: none;
          background: rgba(5, 18, 50, 0.75) !important;
        }
      }
    </style>
  </head>
  <body>
    <div
      class="login-page"
      th:style="'background-image: url(/images/login_bg_bea.jpg)'"
    >
      <div class="left-panel">
        <div class="logo-wrap"></div>

        <div class="divider"></div>
        <div class="tagline">Une Banque à la hauteur de vos aspirations</div>
      </div>

      <div class="right-panel">
        <div class="login-badge">
          <div class="login-badge-dot"></div>
          Accès sécurisé
        </div>
        <div class="login-title">Connexion</div>
        <div class="login-subtitle">
          Entrez vos identifiants pour accéder au portail
        </div>
        <div id="messageArea"></div>

        <form id="loginForm" onsubmit="handleLogin(event)" style="width: 100%">
          <div class="form-group">
            <label class="form-label">Matricule</label>
            <div class="input-wrap">
              <div class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <circle
                    cx="12"
                    cy="8"
                    r="4"
                    stroke="#B0BDD0"
                    stroke-width="1.5"
                  />
                  <path
                    d="M4 20c0-4 3.6-7 8-7s8 3 8 7"
                    stroke="#B0BDD0"
                    stroke-width="1.5"
                    stroke-linecap="round"
                  />
                </svg>
              </div>
              <input
                class="form-input"
                type="text"
                id="matricule"
                placeholder="Ex: ADM001"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Mot de passe</label>
            <div class="input-wrap">
              <div class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <rect
                    x="3"
                    y="11"
                    width="18"
                    height="11"
                    rx="2"
                    stroke="#B0BDD0"
                    stroke-width="1.5"
                  />
                  <path
                    d="M7 11V7a5 5 0 0110 0v4"
                    stroke="#B0BDD0"
                    stroke-width="1.5"
                    stroke-linecap="round"
                  />
                </svg>
              </div>
              <input
                class="form-input"
                type="password"
                id="password"
                placeholder="••••••••••"
                required
              />
              <div class="show-pwd" onclick="togglePassword()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path
                    d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                    stroke="#8A9FBF"
                    stroke-width="1.5"
                  />
                  <circle
                    cx="12"
                    cy="12"
                    r="3"
                    stroke="#8A9FBF"
                    stroke-width="1.5"
                  />
                </svg>
              </div>
            </div>
          </div>

          <button type="submit" class="btn-login" id="submitBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path
                d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            SE CONNECTER
          </button>
        </form>

        <div class="login-footer">
          <div class="footer-line"></div>
          <div class="footer-text">Connexion sécurisée</div>
          <div class="footer-line"></div>
        </div>

        <div class="security-note" style="margin-top: 12px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path
              d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"
              stroke="#5A78AA"
              stroke-width="1.5"
              fill="none"
            />
            <path
              d="M9 12l2 2 4-4"
              stroke="#5A78AA"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span
            >Vos données sont protégées. Ne partagez jamais vos
            identifiants.</span
          >
        </div>
      </div>
    </div>

    <script>
      async function handleLogin(event) {
        event.preventDefault();
        const matricule = document.getElementById("matricule").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("submitBtn");
        btn.innerHTML = "Connexion...";
        btn.disabled = true;
        try {
          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ matricule, password }),
          });
          const data = await res.json();
          if (res.ok && data.token) {
            localStorage.setItem("token", data.token);
            localStorage.setItem("user", JSON.stringify(data));
            showMsg("Connexion réussie ! Redirection...", "success");
            setTimeout(() => (window.location.href = "/dashboard"), 800);
          } else {
            showMsg(
              data.message || "Matricule ou mot de passe incorrect",
              "error",
            );
          }
        } catch (e) {
          showMsg("Erreur de connexion au serveur", "error");
        } finally {
          btn.innerHTML =
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> SE CONNECTER';
          btn.disabled = false;
        }
      }
      function togglePassword() {
        const p = document.getElementById("password");
        p.type = p.type === "password" ? "text" : "password";
      }
      function showMsg(msg, type) {
        const area = document.getElementById("messageArea");
        area.innerHTML = `<div class="${type}-message">${msg}</div>`;
        if (type !== "success") setTimeout(() => (area.innerHTML = ""), 5000);
      }
      // Already logged in? redirect
      if (localStorage.getItem("token")) window.location.href = "/dashboard";
    </script>
  </body>
</html>
