<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion des utilisateurs - BEA Gestion Projets</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
      .users-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .btn-add {
        background: #0d2b6e;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-add:hover {
        background: #1a3f8f;
      }
      .role-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
      }
      .role-admin {
        background: #e05a2b;
        color: white;
      }
      .role-chef_projet {
        background: #5bb8e8;
        color: white;
      }
      .role-consultant {
        background: #1a7a40;
        color: white;
      }
      .empty-state {
        text-align: center;
        padding: 40px;
        color: #8a9fbf;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <!-- TOPBAR -->
      <div class="topbar">
        <div class="topbar-brand">
          <div class="topbar-logo">
            <svg viewBox="0 0 32 32" fill="none" width="20" height="20">
              <circle cx="16" cy="16" r="13" fill="#0D2B6E" />
              <ellipse
                cx="16"
                cy="16"
                rx="5"
                ry="13"
                stroke="#5BB8E8"
                stroke-width="1.4"
                fill="none" />
              <line
                x1="3"
                y1="16"
                x2="29"
                y2="16"
                stroke="#5BB8E8"
                stroke-width="1.4" />
              <circle
                cx="16"
                cy="16"
                r="13"
                stroke="#5BB8E8"
                stroke-width="1.4"
                fill="none" />
            </svg>
          </div>
          <div class="brand-text">
            <div class="brand-name">Banque Extérieure d'Algérie</div>
            <div class="brand-sub">Gestion de projets</div>
          </div>
        </div>
        <div class="topbar-right">
          <div class="user-chip">
            <div class="user-chip-avatar"></div>
            <div class="user-chip-info">
              <div class="user-chip-name"></div>
              <div class="user-chip-role"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="body">
        <!-- SIDEBAR -->
        <div class="sidebar">
          <div class="sidebar-profile">
            <div class="avatar-ring">
              <svg viewBox="0 0 36 36" fill="none">
                <circle cx="18" cy="13" r="7" fill="rgba(255,255,255,0.9)" />
                <path
                  d="M4 32c0-7.7 6.3-14 14-14s14 6.3 14 14"
                  fill="rgba(255,255,255,0.9)" />
              </svg>
            </div>
            <div class="sidebar-name"></div>
            <div class="sidebar-role"></div>
          </div>

          <div class="nav-section-label">Projets</div>
          <div
            class="nav-item"
            onclick="window.location.href = '/api/projets-list'">
            <div class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <rect
                  x="3"
                  y="3"
                  width="7"
                  height="7"
                  rx="1.5"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5" />
                <rect
                  x="14"
                  y="3"
                  width="7"
                  height="7"
                  rx="1.5"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5" />
                <rect
                  x="3"
                  y="14"
                  width="7"
                  height="7"
                  rx="1.5"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5" />
                <rect
                  x="14"
                  y="14"
                  width="7"
                  height="7"
                  rx="1.5"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5" />
              </svg>
            </div>
            <span class="nav-label">Liste des projets</span>
          </div>

          <div class="nav-section-label" style="margin-top: 8px">
            Administration
          </div>
          <div class="nav-item active">
            <div class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <circle
                  cx="12"
                  cy="8"
                  r="4"
                  stroke="#5BB8E8"
                  stroke-width="1.5" />
                <path
                  d="M4 20c0-4 3.6-7 8-7s8 3 8 7"
                  stroke="#5BB8E8"
                  stroke-width="1.5"
                  stroke-linecap="round" />
                <path
                  d="M19 8v6M22 11h-6"
                  stroke="#5BB8E8"
                  stroke-width="1.5"
                  stroke-linecap="round" />
              </svg>
            </div>
            <span class="nav-label">Gérer Utilisateurs</span>
          </div>

          <div
            class="nav-item"
            onclick="window.location.href = '/api/projets/new'">
            <div class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <rect
                  x="3"
                  y="5"
                  width="18"
                  height="16"
                  rx="2"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5"
                  fill="none" />
                <path
                  d="M8 3v4M16 3v4M3 11h18"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="1.5"
                  stroke-linecap="round" />
              </svg>
            </div>
            <span class="nav-label">Créer un Projet</span>
          </div>

          <div class="sidebar-bottom">
            <div class="logout-btn" onclick="logout()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                <path
                  d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"
                  stroke="#E8896A"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
              <span class="logout-label">Déconnexion</span>
            </div>
          </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main">
          <div class="form-card">
            <div class="users-header">
              <div>
                <div class="page-title">Gestion des utilisateurs</div>
                <div class="page-sub">
                  Consultez et gérez tous les utilisateurs enregistrés.
                </div>
              </div>
              <button
                class="btn-add"
                onclick="window.location.href = '/api/users/new'">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="white"
                  stroke-width="2">
                  <path d="M12 5v14M5 12h14" stroke="white" />
                </svg>
                Nouvel utilisateur
              </button>
            </div>

            <div id="users-container">
              <div class="empty-state">Chargement des utilisateurs...</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script th:src="@{/js/auth.js}"></script>
    <script th:src="@{/js/users.js}"></script>
  </body>
</html>
