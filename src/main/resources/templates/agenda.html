<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agenda - BEA Gestion Projets</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
      /* ── Agenda toolbar ── */
      .agenda-toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 20px;
        background: #fff;
        border-bottom: 1px solid #e8f0f8;
      }
      .agenda-search-wrap {
        flex: 1;
        max-width: 380px;
        position: relative;
      }
      .agenda-search-wrap input {
        width: 100%;
        padding: 9px 14px 9px 36px;
        border: 1px solid #d8e6f2;
        border-radius: 20px;
        font-size: 13px;
        background: #f5f9ff;
        color: #2d4a7a;
        outline: none;
        box-sizing: border-box;
      }
      .agenda-search-wrap .search-ic {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
      }
      .month-tabs {
        display: flex;
        gap: 4px;
        margin-left: auto;
      }
      .mtab {
        padding: 6px 14px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        color: #8a9fbf;
        cursor: pointer;
        transition: all .15s;
      }
      .mtab:hover { background: #f0f6ff; color: #2d4a7a; }
      .mtab.active {
        background: #0d2b6e;
        color: #fff;
      }

      /* ── Calendar card ── */
      .agenda-card {
        background: #fff;
        border-radius: 12px;
        margin: 20px;
        box-shadow: 0 2px 12px rgba(13,43,110,.07);
        overflow: hidden;
      }
      .calendar-header {
        display: flex;
        align-items: center;
        background: #0d2b6e;
        color: #fff;
        padding: 14px 20px;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: .3px;
      }
      .calendar-header svg { margin-right: 10px; }
      .calendar-header .week-label {
        margin-left: auto;
        font-size: 12px;
        font-weight: 400;
        opacity: .7;
      }
      .calendar-grid {
        display: grid;
        grid-template-columns: 60px repeat(7, 1fr);
        border-left: 1px solid #e8f0f8;
      }
      /* Day headers */
      .cal-day-header {
        background: #f5f9ff;
        text-align: center;
        padding: 10px 4px;
        border-right: 1px solid #e8f0f8;
        border-bottom: 1px solid #e8f0f8;
        font-size: 11px;
        font-weight: 600;
        color: #4a6080;
        text-transform: uppercase;
        letter-spacing: .5px;
      }
      .cal-day-header span.day-num {
        display: block;
        font-size: 15px;
        font-weight: 700;
        color: #2d4a7a;
        margin-top: 2px;
      }
      .cal-day-header.today span.day-num {
        background: #5bb8e8;
        color: #fff;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin: 2px auto 0;
      }
      .time-col-header {
        background: #f5f9ff;
        border-right: 1px solid #e8f0f8;
        border-bottom: 1px solid #e8f0f8;
      }
      /* Time rows */
      .time-slot {
        border-right: 1px solid #e8f0f8;
        border-bottom: 1px solid #f0f6ff;
        padding: 0 4px;
        font-size: 10px;
        color: #8a9fbf;
        display: flex;
        align-items: flex-start;
        padding-top: 4px;
        height: 48px;
        box-sizing: border-box;
      }
      .cal-cell {
        border-right: 1px solid #e8f0f8;
        border-bottom: 1px solid #f0f6ff;
        height: 48px;
        padding: 2px 3px;
        position: relative;
        box-sizing: border-box;
      }
      /* Events */
      .cal-event {
        border-radius: 5px;
        padding: 3px 7px;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .cal-event .ev-title { font-weight: 600; font-size: 11px; }
      .cal-event .ev-time { font-size: 10px; opacity: .8; }
      .ev-blue { background: #d6eeff; color: #1a5fa8; }
      .ev-teal { background: #d0f4f0; color: #0d7a6e; }
      .ev-orange { background: #fde8d8; color: #b54a0a; }
      .ev-green { background: #d8f5e2; color: #1a7a3a; }

      /* ── Prochaines échéances ── */
      .deadlines-section {
        padding: 0 20px 20px;
      }
      .deadlines-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: .8px;
        color: #4a6080;
        text-transform: uppercase;
        margin-bottom: 12px;
        padding-top: 4px;
      }
      .deadline-item {
        display: flex;
        align-items: center;
        padding: 12px 16px;
        background: #fff;
        border-radius: 10px;
        margin-bottom: 8px;
        box-shadow: 0 1px 6px rgba(13,43,110,.06);
        cursor: pointer;
        transition: box-shadow .15s;
      }
      .deadline-item:hover { box-shadow: 0 3px 14px rgba(13,43,110,.12); }
      .dl-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        margin-right: 14px;
        flex-shrink: 0;
      }
      .dl-dot.blue { background: #5bb8e8; }
      .dl-dot.orange { background: #e88a44; }
      .dl-dot.green { background: #42c97e; }
      .dl-body { flex: 1; }
      .dl-name { font-size: 13px; font-weight: 600; color: #2d4a7a; }
      .dl-meta { font-size: 11px; color: #8a9fbf; margin-top: 2px; }
      .dl-badge {
        font-size: 11px;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 6px;
        white-space: nowrap;
      }
      .dl-badge.en-cours { color: #1a5fa8; background: #d6eeff; }
      .dl-badge.urgent   { color: #b54a0a; background: #fde8d8; }
      .dl-badge.valider  { color: #1a7a3a; background: #d8f5e2; }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <!-- TOPBAR -->
      <div class="topbar">
        <div class="topbar-brand">
          <div class="topbar-logo">
            <svg viewBox="0 0 32 32" fill="none">
              <circle cx="16" cy="16" r="13" fill="#0D2B6E"/>
              <ellipse cx="16" cy="16" rx="5" ry="13" stroke="#5BB8E8" stroke-width="1.4" fill="none"/>
              <line x1="3" y1="16" x2="29" y2="16" stroke="#5BB8E8" stroke-width="1.4"/>
              <circle cx="16" cy="16" r="13" stroke="#5BB8E8" stroke-width="1.4" fill="none"/>
            </svg>
          </div>
          <div class="brand-text">
            <div class="brand-name">Banque Extérieure d'Algérie</div>
            <div class="brand-sub">Gestion de projets</div>
          </div>
        </div>
        <div class="topbar-right">
          <button class="icon-btn" id="searchBtn" title="Rechercher">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <circle cx="11" cy="11" r="8" stroke="#4A6A9E" stroke-width="1.8"/>
              <path d="M21 21l-4.35-4.35" stroke="#4A6A9E" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
          <div class="notif-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"
                stroke="#4A6A9E" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <div class="notif-dot"></div>
          </div>
          <div class="user-chip">
            <div class="user-chip-avatar"></div>
            <div class="user-chip-info">
              <div class="user-chip-name"></div>
              <div class="user-chip-role"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="body">
        <!-- SIDEBAR -->
        <div class="sidebar">
          <div class="sidebar-profile">
            <div class="avatar-ring">
              <svg viewBox="0 0 36 36" fill="none">
                <circle cx="18" cy="13" r="7" fill="rgba(255,255,255,0.9)"/>
                <path d="M4 32c0-7.7 6.3-14 14-14s14 6.3 14 14" fill="rgba(255,255,255,0.9)"/>
              </svg>
            </div>
            <div class="sidebar-name"></div>
            <div class="sidebar-role"></div>
          </div>

          <div class="nav-section-label">Projets</div>

          <div class="nav-item" onclick="window.location.href='/api/projets-list?filter=encours'">
            <div class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
              </svg>
            </div>
            <span class="nav-label">Projet en Cours</span>
            <span class="nav-badge" id="badge-encours">0</span>
          </div>

          <div class="nav-item" onclick="window.location.href='/api/projets-list?filter=attente'">
            <div class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <path d="M12 7v5l3 3" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </div>
            <span class="nav-label">Projet en Attente</span>
            <span class="nav-badge" id="badge-attente">0</span>
          </div>

          <div class="nav-item" onclick="window.location.href='/api/projets-list?filter=termine'">
            <div class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M20 6L9 17l-5-5" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="nav-label">Projet Terminé</span>
            <span class="nav-badge" id="badge-termine">0</span>
          </div>

          <div class="nav-section-label" style="margin-top: 8px">Administration</div>

          <div class="nav-item" onclick="window.location.href='/api/users/new'">
            <div class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="8" r="4" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M19 8v6M22 11h-6" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </div>
            <span class="nav-label">Créer User</span>
          </div>

          <div class="nav-item" onclick="window.location.href='/api/projets/new'">
            <div class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <rect x="3" y="5" width="18" height="16" rx="2" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none"/>
                <path d="M8 3v4M16 3v4M3 11h18" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </div>
            <span class="nav-label">Créer un Projet</span>
          </div>

          <div class="nav-item active" onclick="window.location.href='/api/agenda'">
            <div class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <rect x="3" y="4" width="18" height="18" rx="2" stroke="#5BB8E8" stroke-width="1.5" fill="none"/>
                <path d="M8 2v4M16 2v4M3 10h18" stroke="#5BB8E8" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M8 14h1M12 14h1M16 14h1M8 18h1M12 18h1" stroke="#5BB8E8" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </div>
            <span class="nav-label" style="color:#fff">Agenda</span>
          </div>

          <div class="nav-item" onclick="window.location.href='/api/parametres'">
            <div class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="3" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
              </svg>
            </div>
            <span class="nav-label">Paramètres</span>
          </div>

          <div class="sidebar-bottom">
            <div class="logout-btn" onclick="logout()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"
                  stroke="#E8896A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span class="logout-label">Déconnexion</span>
            </div>
          </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main" style="padding:0; overflow:auto;">
          <!-- Toolbar -->
          <div class="agenda-toolbar">
            <div class="agenda-search-wrap">
              <div class="search-ic">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                  <circle cx="11" cy="11" r="8" stroke="#B0BDD0" stroke-width="1.8"/>
                  <path d="M21 21l-4.35-4.35" stroke="#B0BDD0" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </div>
              <input type="text" placeholder="Rechercher un projet, une tâche…" id="agendaSearch"/>
            </div>
            <div class="month-tabs" id="monthTabs">
              <div class="mtab" data-m="0">Jan</div>
              <div class="mtab active" data-m="1">Fév</div>
              <div class="mtab" data-m="2">Mar</div>
              <div class="mtab" data-m="3">Avr</div>
            </div>
          </div>

          <!-- Calendar -->
          <div class="agenda-card">
            <div class="calendar-header">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="4" width="18" height="18" rx="2" stroke="#5BB8E8" stroke-width="1.5" fill="none"/>
                <path d="M8 2v4M16 2v4M3 10h18" stroke="#5BB8E8" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              <span id="calendarTitle">AGENDA — Février 2025</span>
              <span class="week-label" id="weekLabel">Semaine 7</span>
            </div>

            <div class="calendar-grid" id="calendarGrid">
              <!-- Built by JS -->
            </div>
          </div>

          <!-- Prochaines Échéances -->
          <div class="deadlines-section">
            <div class="deadlines-title">Prochaines Échéances</div>
            <div id="deadlinesList">
              <!-- Built by JS -->
            </div>
          </div>
        </div>
      </div>
    </div>
<script th:src="@{/js/auth.js}"></script>
<script th:src="@{/js/agenda.js}"></script>
 <script th:src="@{/js/projets.js}"></script>
<script th:src="@{/js/users.js}"></script>

  </body>
</html>
